<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexVault - Withdraw Funds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="withdraw.css">
</head>
<body>
  <div class="particles-container" id="particlesContainer"></div>

  <nav class="av-withdraw-nav">
    <div class="av-logo">ApexVault</div>
    <button class="av-back-btn" onclick="window.history.back()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Dashboard
    </button>
  </nav>

  <div class="av-withdraw-container">
    <div class="av-withdraw-card">
      <div class="av-withdraw-header">
        <div class="icon-wrap">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#64ffda" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <h1>Withdraw Funds</h1>
        <p>Withdraw to your crypto wallet</p>
      </div>

      <div class="av-balance-display">
        <span class="label">Available Balance</span>
        <span class="amount" id="currentBalance">$0.00</span>
      </div>

      <div class="av-limit-display" id="limitDisplay">
        <div class="limit-top">
          <span class="label">Daily Withdrawal Limit</span>
          <div class="limit-info">
            <div class="limit-amount" id="limitAmount">$0.00</div>
            <div class="limit-remaining" id="limitRemaining">Loading...</div>
          </div>
        </div>
        <div class="av-limit-bar">
          <div class="fill" id="limitBar" style="width: 0%; background: var(--accent);"></div>
        </div>
      </div>

      <!-- Saved Wallet Address Display -->
      <div class="av-wallet-display" id="walletDisplay" style="display: none;">
        <div class="wallet-label">Your Saved Wallet Address</div>
        <div class="wallet-address" id="savedWalletAddress">Not set</div>
        <button class="av-change-wallet-btn" id="changeWalletBtn">Change Wallet</button>
      </div>

      <!-- Set Wallet Address Form -->
      <div class="av-wallet-form" id="walletForm">
        <div class="av-form-group">
          <label>Your Crypto Wallet Address <span>*</span></label>
          <div class="av-input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H3v5"/><path d="M21 16v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2"/><path d="M12 7V3"/><path d="M12 21v-4"/></svg>
            </span>
            <input type="text" id="userWalletAddress" placeholder="Enter your BTC/ETH/USDT wallet address" />
          </div>
          <div class="wallet-hint">This is where ApexVault will send your withdrawals</div>
        </div>
        <button type="button" class="av-save-wallet-btn" id="saveWalletBtn">Save Wallet Address</button>
      </div>

      <form id="withdrawForm" onsubmit="return false;">
        <div class="av-form-group">
          <label>Withdrawal Method <span>*</span></label>
          <div class="av-input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            </span>
            <select id="withdrawMethod">
              <option value="">Select method...</option>
              <option value="crypto">Crypto Wallet</option>
              <option value="bank" disabled>Bank Transfer (Currently Not Available)</option>
              <option value="paypal" disabled>PayPal (Currently Not Available)</option>
            </select>
          </div>
        </div>

        <div class="av-form-group">
          <label>Amount <span>*</span></label>
          <div class="av-input-wrap av-amount-input-wrap">
            <span class="currency">$</span>
            <input type="number" id="withdrawAmount" placeholder="0.00" min="0.01" step="0.01" />
          </div>
          <div class="av-amount-presets" id="presetContainer">
            <button type="button" data-amount="50">$50</button>
            <button type="button" data-amount="100">$100</button>
            <button type="button" data-amount="500">$500</button>
            <button type="button" data-amount="1000">$1,000</button>
          </div>
        </div>

        <div class="av-withdraw-summary" id="withdrawSummary" style="display: none;">
          <div class="row">
            <span class="label">Amount</span>
            <span class="value" id="summaryAmount">$0.00</span>
          </div>
          <div class="row">
            <span class="label">Processing Fee</span>
            <span class="value fee" id="summaryFee">$0.00</span>
          </div>
          <div class="row total">
            <span class="label">Total Deducted</span>
            <span class="value" id="summaryTotal">$0.00</span>
          </div>
        </div>

        <button type="submit" class="av-withdraw-btn" id="withdrawBtn" disabled>
          Request Withdrawal
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="withdraw.js"></script>
</body>
              </html>
