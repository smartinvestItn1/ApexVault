<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexVault - Send Money</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="transfer.css">
</head>
<body>
  <nav class="av-transfer-nav">
    <div class="av-logo">ApexVault</div>
    <button class="av-back-btn" onclick="window.history.back()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Dashboard
    </button>
  </nav>

  <div class="av-transfer-container">
    <div class="av-transfer-card">
      <div class="av-transfer-header">
        <div class="icon-wrap">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#64ffda" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </div>
        <h1>Send Money</h1>
        <p>Transfer funds to any registered ApexVault user</p>
      </div>

      <div class="av-balance-display">
        <span class="label">Available Balance</span>
        <span class="amount" id="currentBalance">$0.00</span>
      </div>

      <div class="av-limit-display" id="limitDisplay">
        <div class="limit-top">
          <span class="label">Daily Transfer Limit</span>
          <div class="limit-info">
            <div class="limit-amount" id="limitAmount">$0.00</div>
            <div class="limit-remaining" id="limitRemaining">Loading...</div>
          </div>
        </div>
        <div class="av-limit-bar">
          <div class="fill" id="limitBar" style="width: 0%; background: var(--accent);"></div>
        </div>
      </div>

      <form id="transferForm" onsubmit="return false;">
        <div class="av-form-group">
          <label>Recipient Email <span>*</span></label>
          <div class="av-input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </span>
            <input type="email" id="recipientEmail" placeholder="user@example.com" autocomplete="off" />
          </div>
          <div id="userResult"></div>
        </div>

        <div class="av-form-group">
          <label>Amount <span>*</span></label>
          <div class="av-input-wrap av-amount-input-wrap">
            <span class="currency">$</span>
            <input type="number" id="transferAmount" placeholder="0.00" min="0.01" step="0.01" />
          </div>
          <div class="av-amount-presets" id="presetContainer">
            <button type="button" data-amount="10">$10</button>
            <button type="button" data-amount="50">$50</button>
            <button type="button" data-amount="100">$100</button>
            <button type="button" data-amount="500">$500</button>
            <button type="button" data-amount="1000">$1,000</button>
          </div>
        </div>

        <div class="av-form-group">
          <label>Note (Optional)</label>
          <div class="av-input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            </span>
            <input type="text" id="transferNote" placeholder="What's this for?" maxlength="100" />
          </div>
        </div>

        <div class="av-transfer-summary" id="transferSummary" style="display: none;">
          <div class="row">
            <span class="label">Amount</span>
            <span class="value" id="summaryAmount">$0.00</span>
          </div>
          <div class="row">
            <span class="label">Transfer Fee</span>
            <span class="value" style="color: var(--success);">Free</span>
          </div>
          <div class="row total">
            <span class="label">Total</span>
            <span class="value" id="summaryTotal">$0.00</span>
          </div>
        </div>

        <button type="submit" class="av-transfer-btn" id="sendBtn" disabled>
          Send Money
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="transfer.js"></script>
</body>
          </html>
